# Standalone PostgreSQL environment for apollon-aegis-collector.
#
# Independent from the /opt/apollon-aegis multi-service stack in terms of
# container name, host port (31110, since 31010 is already taken by
# apollon-aegis-postgresql on the same host), and data directory — but it
# also attaches to the existing apollon-aegis-network so it's reachable
# from the other apollon-aegis services (fast-api, airflow, etc.) by
# container name, alongside its own dedicated network.
#
# apollon-aegis-network is declared `external` below because it's created
# by the main /opt/apollon-aegis docker-compose.yml, not by this file. It
# must already exist on the host before `docker compose up` — either
# because that stack is already running, or because deploy_remote.sh /
# deploy_git_clone.sh create it first if missing (see attach_network.sh).
#
# Usage:
#   cd postgresql
#   cp .env.example .env      # adjust credentials if needed
#   docker network create apollon-aegis-network 2>/dev/null || true
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down       # data persists in ./data

services:
  postgresql:
    build:
      context: .
      dockerfile: Dockerfile
    image: apollon-aegis-collector-postgresql:16
    container_name: apollon-aegis-collector-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apollon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-20tlwkr26!}
      POSTGRES_DB: ${POSTGRES_DB:-apollon}
      TZ: Asia/Seoul
    ports:
      # Bound to localhost only — this server is reachable from the public
      # internet, so Postgres itself should not be. Use an SSH tunnel
      # (ssh -L 31110:127.0.0.1:31110 user@host) to reach it remotely.
      - "127.0.0.1:31110:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apollon} -d ${POSTGRES_DB:-apollon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apollon-aegis-collector-network
      - apollon-aegis-network

networks:
  apollon-aegis-collector-network:
    name: apollon-aegis-collector-network
    driver: bridge
  apollon-aegis-network:
    name: apollon-aegis-network
    external: true
